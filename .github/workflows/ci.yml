name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 456456456
          MYSQL_DATABASE: dealhub_th_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: mysql://root:456456456@localhost:3306/dealhub_th_test
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: mysql://root:456456456@localhost:3306/dealhub_th_test
      - run: npm run test
      - run: npm run build

  web-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci
      - run: npm run build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:3001/api/v1
          NUXT_PUBLIC_SITE_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    needs: [api-test, web-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          tags: dealhub-api:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          tags: dealhub-web:latest
