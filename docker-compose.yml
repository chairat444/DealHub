version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dealhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 456456456
      MYSQL_DATABASE: dealhub_th
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p456456456']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dealhub-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dealhub-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: mysql://root:456456456@mysql:3306/dealhub_th
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dealhub-th-jwt-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dealhub-th-refresh-secret}
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: dealhub-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NUXT_PUBLIC_API_BASE: http://api:3001/api/v1
      NUXT_PUBLIC_SITE_URL: http://localhost:3000
    depends_on:
      - api

volumes:
  mysql_data:
  redis_data:
